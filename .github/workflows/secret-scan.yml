name: secret-scan
on:
  pull_request:
  push:
    branches: [main]

jobs:
  betterleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Betterleaks
        run: |
          curl -sSL https://github.com/betterleaks/betterleaks/releases/latest/download/betterleaks_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin betterleaks

      - name: Scan
        run: |
          betterleaks git . \
            --report-format sarif \
            --report-path betterleaks.sarif \
            --exit-code 1

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: betterleaks.sarif
